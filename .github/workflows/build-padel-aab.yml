name: Build Padel App AAB (release firmato)

# Compila l'Android App Bundle FIRMATO per Google Play. Solo su richiesta
# manuale (mai in automatico), perché usa la chiave di firma reale.
# Richiede questi Secrets del repository (Settings → Secrets and variables →
# Actions): PADEL_KEYSTORE_BASE64, PADEL_KEYSTORE_PASSWORD, PADEL_KEY_ALIAS,
# PADEL_KEY_PASSWORD.
on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'versionCode (intero, deve aumentare ad ogni upload su Play)'
        required: true
        default: '1'
      version_name:
        description: 'versionName (es. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Imposta JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Imposta Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa e configura l'Android SDK
        uses: android-actions/setup-android@v3

      - name: Installa i pacchetti Android SDK richiesti
        run: sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Decodifico il keystore dal Secret
        working-directory: padel-app
        run: echo "${{ secrets.PADEL_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Compilo l'AAB firmato
        working-directory: padel-app
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/padel-app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.PADEL_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PADEL_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.PADEL_KEY_PASSWORD }}
          VERSION_CODE: ${{ inputs.version_code }}
          VERSION_NAME: ${{ inputs.version_name }}
        run: bash build-aab-ci.sh

      - name: Carica l'AAB come artifact (privato, solo per te)
        uses: actions/upload-artifact@v4
        with:
          name: padel-app-release-aab-${{ inputs.version_code }}
          path: padel-app/.capacitor-build-release/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Rimuovo il keystore decodificato dal runner
        if: always()
        working-directory: padel-app
        run: rm -f release.keystore
