name: cucina360
description: App per panoramiche 360° di cucine con editor colori in locale.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # Sensori (giroscopio, accelerometro)
  sensors_plus: ^4.0.2

  # Database locale
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigazione
  go_router: ^13.2.1

  # In-app purchase (Android + iOS con lo stesso codice)
  in_app_purchase: ^3.1.13

  # Viewer 360° (panoramica equirettangolare + giroscopio)
  panorama_viewer: ^1.0.0

  # Processing immagini (fallback CPU per cambio colore)
  image: ^4.1.7

  # UI
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0

  # Utility
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
