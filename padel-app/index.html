<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0F2027">
<title>Padel App</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="nav-icon-gradient" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" style="stop-color:var(--accent)"/>
        <stop offset="1" style="stop-color:var(--accent-2)"/>
      </linearGradient>
    </defs>
  </svg>

  <div id="offline-banner" class="banner hidden"></div>

  <main id="app" class="app"></main>

  <nav id="bottom-nav" class="bottom-nav hidden">
    <button data-route="home" class="nav-btn">
      <span class="nav-icon" data-icon="home"></span><span class="nav-label">Home</span>
    </button>
    <button data-route="scoreboard" class="nav-btn">
      <span class="nav-icon" data-icon="scoreboard"></span><span class="nav-label">Punteggio</span>
    </button>
    <button data-route="community" class="nav-btn">
      <span class="nav-icon" data-icon="community"></span><span class="nav-label">Community</span>
    </button>
    <button data-route="settings" class="nav-btn">
      <span class="nav-icon" data-icon="settings"></span><span class="nav-label">Impostazioni</span>
    </button>
    <button data-route="events" class="nav-btn">
      <span class="nav-icon" data-icon="events"></span><span class="nav-label">Eventi</span>
    </button>
    <button data-route="stats" class="nav-btn">
      <span class="nav-icon" data-icon="stats"></span><span class="nav-label">Statistiche</span>
    </button>
    <button data-route="profile" class="nav-btn">
      <span class="nav-icon" data-icon="profile"></span><span class="nav-label">Profilo</span>
    </button>
  </nav>

  <div id="toast-container" class="toast-container"></div>

  <script src="./js/vendor/capacitor-core.js"></script>
  <script src="./js/vendor/capacitor-tts-plugin.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
