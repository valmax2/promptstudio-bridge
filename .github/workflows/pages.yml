name: Deploy Poly Reducer 3D to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari per pubblicare su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una pubblicazione alla volta
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Pages (abilita automaticamente)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Pubblica solo la cartella dell'app come radice del sito
      - name: Carica l'app 3D
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./3d-reducer

      - name: Deploy su Pages
        id: deployment
        uses: actions/deploy-pages@v4
