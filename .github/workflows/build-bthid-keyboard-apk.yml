name: Build BT HID Keyboard APK

on:
  push:
    branches:
      - "claude/android-bluetooth-hid-keyboard-*"
    paths:
      - "bt-hid-keyboard/**"
      - ".github/workflows/build-bthid-keyboard-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bt-hid-keyboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('bt-hid-keyboard/**/*.gradle*', 'bt-hid-keyboard/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: echo "path=$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vstudio-hid-keyboard-debug-apk
          path: bt-hid-keyboard/${{ steps.apk.outputs.path }}

      - name: Publish APK as GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bthid-keyboard-run-${{ github.run_number }}
          name: VStudio HID Keyboard (debug build #${{ github.run_number }})
          prerelease: true
          files: bt-hid-keyboard/${{ steps.apk.outputs.path }}
