name: Build Sudoku APK

# Compila un APK di debug dell'app Sudoku (VStudio Apps) usando l'Android SDK
# già presente sui runner GitHub-hosted, e lo carica come artifact scaricabile.
on:
  push:
    paths:
      - 'sudoku/**'
      - '.github/workflows/build-sudoku-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Imposta JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Imposta Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa i pacchetti Android SDK richiesti
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Compila l'APK di debug
        working-directory: sudoku
        run: bash build-apk.sh

      - name: Carica l'APK come artifact
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-debug-apk
          path: sudoku/.capacitor-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
